<!DOCTYPE html>
<html>
<head>
<title>TechX Fest Registration Portal</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-box{
    width:560px;
    background:#ffffff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-bottom:25px;
}

label{
    font-weight:600;
    margin-top:14px;
    display:block;
    color:#333;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:1px solid #bbb;
    border-radius:6px;
    font-size:14px;
    transition:0.3s;
}

input:focus, select:focus, textarea:focus{
    border-color:#0d47a1;
    box-shadow:0 0 6px rgba(13,71,161,0.4);
    outline:none;
}

.row{
    display:flex;
    gap:12px;
}

.row > div{
    flex:1;
}

.actions{
    text-align:center;
    margin-top:25px;
}

button{
    padding:11px 24px;
    border:none;
    border-radius:7px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.btn-submit{
    background:#0d47a1;
    color:white;
}

.btn-submit:hover{
    background:#08306b;
}

.btn-clear{
    background:#ff5252;
    color:white;
}

.btn-clear:hover{
    background:#c62828;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    color:#777;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="form-box">

<h1>TechX Fest Registration</h1>

<form>

<label>Participant Name</label>
<input type="text" placeholder="Your full name" required>

<div class="row">

<div>
<label>Email ID</label>
<input type="email" placeholder="example@mail.com" required>
</div>

<div>
<label>Mobile No.</label>
<input type="tel" placeholder="10-digit number">
</div>

</div>

<label>Institute / College</label>
<input type="text" placeholder="Name of your college">

<label>Branch</label>
<input type="text" placeholder="e.g. IT, Mechanical">

<label>Academic Year</label>
<select>
<option>Select your year</option>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>

<label>Event Category</label>
<select>
<option>Select event</option>
<option>Code Sprint</option>
<option>AI Challenge</option>
<option>Robo Race</option>
<option>UI/UX Battle</option>
<option>Technical Quiz</option>
</select>

<label>Team Members (if any)</label>
<input type="number" min="1" max="6" placeholder="Number of participants">

<label>Additional Information</label>
<textarea rows="4" placeholder="Mention any special requirements"></textarea>

<div class="actions">
<button type="submit" class="btn-submit">Register</button>
<button type="reset" class="btn-clear">Clear Form</button>
</div>

</form>

<div class="footer">
TechX Fest • Student Registration Portal
</div>

</div>

</div>

</body>
</html>
